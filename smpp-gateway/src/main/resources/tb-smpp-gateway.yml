server:
  # Server bind address
  address: "${HTTP_BIND_ADDRESS:0.0.0.0}"
  # Server bind port
  port: "${HTTP_BIND_PORT:8085}"

security:
  basic_auth:
    username: "${BASIC_AUTH_USERNAME:user}"
    password: "${BASIC_AUTH_PASSWORD:password}"

smpp:
  # SMPP version: 3.3 or 3.4
  version: "${SMPP_VERSION:3.4}"
  host: "${SMPP_HOST:localhost}"
  port: "${SMPP_PORT:2775}"
  system_id: "${SMPP_SYSTEM_ID:}"
  password: "${SMPP_PASSWORD:password}"
  system_type: "${SMPP_SYSTEM_TYPE:}"
  bind_type: "${SMPP_BIND_TYPE:TX}" # TX (Transmitter), RX (Receiver) or TRX (Transceiver)
  service_type: "${SMPP_SERVICE_TYPE:}"
  source_address: "${SMPP_SOURCE_ADDRESS:}"
  # Type of Number; allowed values: from 0 to 6
  ton: "${SMPP_SOURCE_TON:0}"
  # Numbering Plan Identification; allowed values: from 0 to 9
  npi: "${SMPP_SOURCE_NPI:0}"
  destination_ton: "${SMPP_DESTINATION_TON:1}"
  destination_npi: "${SMPP_DESTINATION_NPI:0}"
  encoding: "${SMPP_ENCODING:0}" # Allowed values: from 0 to 14. The default encoding (0) is GSM7
  address_range: "${SMPP_ADDRESS_RANGE:}"

service:
  type: "${TB_SERVICE_TYPE:tb-smpp-gateway}"
  # Unique id for this service (autogenerated if empty)
  id: "${TB_SERVICE_ID:tb-smpp-gateway}"
  tenant_id: "${TB_SERVICE_TENANT_ID:}" # empty or specific tenant id.

metrics:
  # Enable/disable actuator metrics.
  enabled: "${METRICS_ENABLED:false}"
